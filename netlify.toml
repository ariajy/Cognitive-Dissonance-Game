# Static site: no real build. Do not list netlify-cli in package.json — its install breaks CI.
[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

# Trace node_modules for Functions so `mongodb` is included correctly (esbuild can break drivers).
[functions]
  node_bundler = "nft"

# POST /api/registrations → registrations.js (see netlify/functions/registrations.js)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
